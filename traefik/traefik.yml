api:
  dashboard: true

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: traefik_web
  swarm:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: traefik_proxy
  file:
    filename: /dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@ignitesolutions.click
      storage: /acme.json
      httpChallenge:
        entryPoint: web

  myresolver:
    acme:
      email: admin@ignitesolutions.click
      storage: /acme.json
      httpChallenge:
        entryPoint: web

  cloudflare:
    acme:
      email: admin@ignitesolutions.click
      storage: /acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
