api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: :80
  websecure:
    address: :443
  traefik:
    address: :8080

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: traefik_web
  swarm:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: traefik_proxy
  file:
    filename: /traefik.yml
    watch: true

http:
  middlewares:
    auth:
      basicAuth:
        users:
          # admin:admin - change password in production!
          - "admin:$apr1$OPVU.p48$2wLwuBgoV/mBq1q6eTfoU0"

certificatesResolvers:
  myresolver:
    acme:
      email: admin@ignitesolutions.click
      storage: acme.json
      httpChallenge:
        entryPoint: web
